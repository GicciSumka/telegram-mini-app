<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Case Opener</title>
    <script src="https://cloudflare.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.15);
            --accent: #FFD700;
        }

        body {
            margin: 0; background: #08080a; color: white;
            font-family: 'Inter', sans-serif; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .app-container {
            width: 400px; height: 750px;
            background: radial-gradient(circle at top, #252535, #08080a);
            border-radius: 45px; border: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 30px;
            position: relative; overflow: hidden; box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        /* Верхняя панель */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .balance-box { background: var(--glass); padding: 10px 20px; border-radius: 20px; border: 1px solid var(--border); }
        .balance-box span { color: var(--accent); font-weight: 900; font-size: 1.2em; }

        /* Зона Кейса */
        .case-area {
            position: relative; width: 100%; height: 180px;
            background: rgba(0,0,0,0.3); border-radius: 25px;
            margin-bottom: 40px; overflow: hidden;
            border: 2px solid var(--border);
        }

        /* Центральный указатель */
        .pointer {
            position: absolute; left: 50%; top: 0; bottom: 0;
            width: 4px; background: var(--accent); z-index: 10;
            transform: translateX(-50%); box-shadow: 0 0 20px var(--accent);
        }

        /* Лента с призами */
        .reel {
            display: flex; align-items: center; position: absolute;
            left: 0; top: 0; height: 100%; will-change: transform;
        }

        .item {
            min-width: 120px; height: 120px; margin: 0 10px;
            background: var(--glass); border-radius: 20px;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; border: 1px solid var(--border);
        }

        .item.rare { border-color: #a335ee; background: rgba(163, 53, 238, 0.1); }
        .item.epic { border-color: #ff8000; background: rgba(255, 128, 0, 0.1); }
        .item.legendary { border-color: var(--accent); background: rgba(255, 215, 0, 0.1); }

        .item img { width: 50px; margin-bottom: 10px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
        .item span { font-weight: 700; font-size: 14px; }

        /* Кнопка */
        .open-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none; padding: 20px; border-radius: 25px;
            color: #000; font-weight: 900; font-size: 1.1em;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 15px 30px rgba(255, 140, 0, 0.3);
        }

        .open-btn:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

        .task-list { flex-grow: 1; overflow-y: auto; margin-top: 30px; }
        .task { background: var(--glass); padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div><small style="opacity: 0.5;">LUCKY STAR</small></div>
            <div class="balance-box">⭐ <span id="balance">500</span></div>
        </div>

        <div class="case-area">
            <div class="pointer"></div>
            <div class="reel" id="reel">
                <!-- Элементы генерируются скриптом -->
            </div>
        </div>

        <button class="open-btn" id="spinBtn" onclick="startSpin()">ОТКРЫТЬ КЕЙС (50 ⭐)</button>

        <div class="task-list">
            <div style="font-size: 12px; opacity: 0.5; margin-bottom: 15px; letter-spacing: 1px;">БЕСПЛАТНЫЕ ЗВЕЗДЫ</div>
            <div class="task" onclick="addMoney(100)">
                <span>Смотреть рекламу</span>
                <b style="color: var(--accent);">+100</b>
            </div>
            <div class="task" onclick="addMoney(50)">
                <span>Daily Bonus</span>
                <b style="color: var(--accent);">+50</b>
            </div>
        </div>
    </div>

    <script>
        const reel = document.getElementById('reel');
        const balanceEl = document.getElementById('balance');
        const spinBtn = document.getElementById('spinBtn');
        
        let balance = 500;
        const itemWidth = 140; // ширина + margin
        const itemsData = [
            { name: '10', type: 'common', val: 10 },
            { name: '25', type: 'common', val: 25 },
            { name: '50', type: 'rare', val: 50 },
            { name: '100', type: 'epic', val: 100 },
            { name: '500', type: 'legendary', val: 500 },
            { name: '0', type: 'common', val: 0 },
        ];

        // Заполняем ленту
        function createReel() {
            reel.innerHTML = '';
            for (let i = 0; i < 50; i++) {
                const randomItem = itemsData[Math.floor(Math.random() * itemsData.length)];
                const div = document.createElement('div');
                div.className = `item ${randomItem.type}`;
                div.innerHTML = `<span>⭐</span><b>${randomItem.name}</b>`;
                reel.appendChild(div);
            }
        }

        function startSpin() {
            if (balance < 50) return alert('Мало звезд!');
            
            balance -= 50;
            updateUI();
            spinBtn.disabled = true;

            // Сброс позиции
            gsap.set(reel, { x: 0 });

            const winIndex = 40; // На каком элементе остановимся
            const stopPos = (winIndex * itemWidth) - (200 - itemWidth / 2); // Центрирование
            const targetItem = reel.children[winIndex];

            // Анимация прокрутки
            gsap.to(reel, {
                x: -stopPos,
                duration: 5,
                ease: "power4.inOut",
                onComplete: () => {
                    const winVal = parseInt(targetItem.innerText.replace('⭐', ''));
                    balance += winVal;
                    updateUI();
                    spinBtn.disabled = false;
                    
                    // Эффект победы
                    gsap.to(targetItem, { scale: 1.2, duration: 0.3, yoyo: true, repeat: 3 });
                }
            });
        }

        function addMoney(amount) {
            balance += amount;
            updateUI();
            gsap.from(balanceEl, { scale: 1.5, duration: 0.3 });
        }

        function updateUI() {
            balanceEl.innerText = balance;
        }

        createReel();
    </script>
</body>
</html>
