<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Casino UI</title>
    <script src="https://cloudflare.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --accent: #FFD700;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top right, #1e1e2f, #0a0a0c);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Стеклянная карточка */
        .app-container {
            width: 380px;
            height: 700px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            padding: 25px;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .balance-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 25px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .balance-value {
            font-size: 2em;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .section-title {
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
            margin-bottom: 15px;
        }

        /* Список заданий */
        .task-list {
            flex-grow: 1;
            overflow-y: auto;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
        }

        .task-info h4 { margin: 0; font-size: 14px; }
        .task-info p { margin: 5px 0 0; font-size: 11px; opacity: 0.5; }

        .reward { color: var(--accent); font-weight: bold; }

        /* Кнопка игры */
        .play-btn {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            border: none;
            padding: 18px;
            border-radius: 20px;
            color: black;
            font-weight: 800;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(255, 165, 0, 0.3);
        }

        .play-btn:active { transform: scale(0.95); }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-container" id="app">
        <div class="header">
            <div>
                <div style="font-size: 12px; opacity: 0.6;">Твой баланс</div>
                <div class="balance-value" id="balance">0</div>
            </div>
            <div style="font-size: 24px;">✨</div>
        </div>

        <div class="section-title">Задания за звезды</div>
        <div class="task-list">
            <div class="task-item" onclick="completeTask(50, this)">
                <div class="task-info">
                    <h4>Подписаться на канал</h4>
                    <p>Проверка 2 минуты</p>
                </div>
                <div class="reward">+50 ⭐</div>
            </div>
            <div class="task-item" onclick="completeTask(100, this)">
                <div class="task-info">
                    <h4>Пригласить друга</h4>
                    <p>Бонус за каждого</p>
                </div>
                <div class="reward">+100 ⭐</div>
            </div>
            <div class="task-item" onclick="completeTask(20, this)">
                <div class="task-info">
                    <h4>Ежедневный вход</h4>
                    <p>Забирай сейчас</p>
                </div>
                <div class="reward">+20 ⭐</div>
            </div>
        </div>

        <button class="play-btn" onclick="playGame()">ИГРАТЬ (Ставка 10 ⭐)</button>
    </div>

    <script>
        // Имитация БД через LocalStorage
        let balance = localStorage.getItem('star_balance') ? parseInt(localStorage.getItem('star_balance')) : 100;
        const balanceEl = document.getElementById('balance');

        function updateUI() {
            balanceEl.innerText = balance;
            localStorage.setItem('star_balance', balance);
        }

        // Плавная анимация появления
        gsap.from("#app", { duration: 1.2, opacity: 0, y: 50, ease: "power4.out" });
        gsap.from(".task-item", { duration: 0.8, opacity: 0, x: -20, stagger: 0.2, delay: 0.5 });

        function completeTask(amount, el) {
            balance += amount;
            updateUI();
            
            // Анимация нажатия
            gsap.to(el, { x: 10, duration: 0.1, yoyo: true, repeat: 1 });
            gsap.to(balanceEl, { scale: 1.2, duration: 0.2, yoyo: true, repeat: 1, color: '#00ff00' });
        }

        function playGame() {
            if (balance < 10) {
                alert("Недостаточно звезд!");
                return;
            }
            
            balance -= 10;
            updateUI();

            // Имитация игры (рандом)
            const win = Math.random() > 0.7; // 30% шанс на выигрыш
            const prize = 50;

            if (win) {
                setTimeout(() => {
                    balance += prize;
                    updateUI();
                    alert("ВЫИГРЫШ: " + prize + " звезд! ✨");
                }, 500);
            }
            
            gsap.to(".play-btn", { rotation: 2, duration: 0.1, yoyo: true, repeat: 5 });
        }

        updateUI();
    </script>
</body>
</html>
