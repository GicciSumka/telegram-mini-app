<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App Casino</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #0f0f1a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 215, 0, 0.2);
            --gold-accent: #ffd700;
            --neon-purple: #b829ff;
            --text-color: #e0e0e0;
            --text-color-light: #f0f0f0;
            --text-color-dark: #a0a0a0;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --neon-glow-gold: 0 0 5px var(--gold-accent), 0 0 10px var(--gold-accent), 0 0 15px var(--gold-accent);
            --neon-glow-purple: 0 0 5px var(--neon-purple), 0 0 10px var(--neon-purple), 0 0 15px var(--neon-purple);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background-color: var(--bg-gradient-end);
            box-shadow: 0 0 30px var(--shadow-color);
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .user-info {
            display: flex;
            align-items: center;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--gold-accent);
            margin-right: 10px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2em;
            font-weight: bold;
            color: var(--bg-gradient-end);
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-name {
            font-weight: 600;
            color: var(--text-color-light);
        }

        .balance-info {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 5px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .balance-info:hover {
            box-shadow: var(--neon-glow-gold);
        }

        .balance-info .star-icon {
            color: var(--gold-accent);
            margin-right: 8px;
            font-size: 1.2em;
            text-shadow: var(--neon-glow-gold);
        }

        .balance-amount {
            font-weight: 700;
            color: var(--gold-accent);
            font-size: 1.1em;
            text-shadow: var(--neon-glow-gold);
        }

        .sparkle {
            position: absolute;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, transparent 70%);
            border-radius: 50%;
            animation: sparkle-anim 0.5s ease-out forwards;
            pointer-events: none;
            transform: scale(0);
        }

        @keyframes sparkle-anim {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        /* Navigation Tabs */
        .tabs {
            display: flex;
            justify-content: space-around;
            background: var(--card-bg);
            border-top: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 0;
            position: sticky;
            bottom: 0;
            z-index: 1000;
        }

        .tab-button {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            color: var(--text-color-dark);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab-button.active {
            color: var(--gold-accent);
            text-shadow: var(--neon-glow-gold);
        }

        .tab-button::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background-color: var(--gold-accent);
            transition: width 0.3s ease;
        }

        .tab-button.active::after {
            width: 80%;
        }

        /* Content Sections */
        .content-section {
            flex-grow: 1;
            padding: 20px;
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .content-section.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .section-title {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--gold-accent);
            text-align: center;
            margin-bottom: 25px;
            text-shadow: var(--neon-glow-gold);
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4), var(--neon-glow-gold);
        }

        /* Buttons */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            color: var(--text-color-light);
            box-shadow: var(--neon-glow-purple);
            background: linear-gradient(45deg, var(--neon-purple) 0%, #8a2be2 100%);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
            background: #333;
        }

        .btn:not(:disabled):active {
            transform: scale(0.98);
        }

        .btn.gold {
            background: linear-gradient(45deg, var(--gold-accent) 0%, #e6b800 100%);
            box-shadow: var(--neon-glow-gold);
            color: var(--bg-gradient-end);
        }

        .btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            animation: ripple-effect 0.6s linear forwards;
            opacity: 0;
            transform: scale(0);
        }

        @keyframes ripple-effect {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        /* Roulette Game */
        .roulette-wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 30px auto;
            border-radius: 50%;
            background: radial-gradient(circle, #333 0%, #111 100%);
            border: 5px solid var(--gold-accent);
            box-shadow: var(--neon-glow-gold), 0 0 20px rgba(0, 0, 0, 0.8) inset;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .roulette-wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .wheel-sector {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            left: 50%;
            top: 50%;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); /* This is a placeholder, actual clip-path will be calculated by JS */
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.5em;
            color: var(--text-color-light);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
        }

        .wheel-sector span {
            transform: rotate(45deg) translate(-50%, -50%); /* Adjust text orientation */
            position: absolute;
            top: 25%;
            left: 25%;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .wheel-pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 25px solid var(--gold-accent);
            z-index: 10;
            filter: drop-shadow(var(--neon-glow-gold));
        }

        /* Tasks Section */
        .task-item {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-item h3 {
            margin: 0;
            color: var(--gold-accent);
            font-size: 1.2em;
        }

        .task-item p {
            margin: 0;
            color: var(--text-color);
            font-size: 0.9em;
        }

        .task-item .reward {
            font-weight: 600;
            color: var(--gold-accent);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .task-item .reward .star-icon {
            font-size: 1em;
            text-shadow: var(--neon-glow-gold);
        }

        .task-item .btn {
            margin-top: 10px;
            padding: 10px;
            font-size: 1em;
        }

        /* Daily Bonus */
        .daily-bonus-card {
            text-align: center;
        }

        .daily-bonus-card h3 {
            color: var(--neon-purple);
            text-shadow: var(--neon-glow-purple);
            margin-bottom: 15px;
        }

        .daily-bonus-card .btn {
            margin-top: 20px;
            padding: 20px;
            font-size: 1.3em;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.6), var(--neon-glow-gold);
            max-width: 300px;
            width: 90%;
            transform: translateY(-50px);
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
            opacity: 1;
        }

        .modal-content h2 {
            color: var(--gold-accent);
            margin-top: 0;
            font-size: 1.8em;
            text-shadow: var(--neon-glow-gold);
        }

        .modal-content p {
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .modal-content .btn {
            margin-top: 20px;
        }

        /* Toast Notification */
        .toast-container {
            position: fixed;
            bottom: 80px; /* Above tabs */
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: rgba(0, 0, 0, 0.8);
            color: var(--text-color-light);
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(20px);
            animation: toast-anim 3s forwards;
            min-width: 200px;
            text-align: center;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        @keyframes toast-anim {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            10% {
                opacity: 1;
                transform: translateY(0);
            }
            90% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        /* Responsive adjustments */
        @media (max-width: 450px) {
            .app-container {
                border-radius: 0;
                min-height: 100vh;
            }
            body {
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="user-info">
                <div class="user-avatar" id="user-avatar"></div>
                <span class="user-name" id="user-name">Гость</span>
            </div>
            <div class="balance-info" id="balance-info">
                <span class="star-icon">⭐</span>
                <span class="balance-amount" id="balance-amount">100</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Casino Section -->
            <section id="casino-section" class="content-section active">
                <h2 class="section-title">🎰 Казино</h2>
                <div class="card">
                    <h3>Рулетка</h3>
                    <p>Крутите колесо и умножайте свои звёзды!</p>
                    <div class="roulette-wheel-container">
                        <div class="roulette-wheel" id="roulette-wheel">
                            <!-- Sectors will be generated by JS -->
                        </div>
                        <div class="wheel-pointer"></div>
                    </div>
                    <button class="btn gold" id="spin-roulette-btn">Крутить за 10 ⭐</button>
                </div>
            </section>

            <!-- Tasks Section -->
            <section id="tasks-section" class="content-section">
                <h2 class="section-title">📋 Задания</h2>
                <div id="tasks-list">
                    <!-- Tasks will be generated by JS -->
                </div>

                <div class="card daily-bonus-card">
                    <h3>Ежедневный бонус</h3>
                    <p>Забирайте 20 ⭐ каждый день!</p>
                    <button class="btn" id="claim-daily-bonus-btn">Забрать 20 ⭐</button>
                </div>
            </section>
        </main>

        <!-- Navigation Tabs -->
        <nav class="tabs">
            <div class="tab-button active" data-target="casino-section">🎰 Казино</div>
            <div class="tab-button" data-target="tasks-section">📋 Задания</div>
        </nav>
    </div>

    <!-- Modal for game results -->
    <div class="modal-overlay" id="game-result-modal">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <p id="modal-message"></p>
            <button class="btn gold" id="modal-close-btn">ОК</button>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        // Инициализация Telegram Web App SDK
        if (window.Telegram && window.Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
            Telegram.WebApp.setHeaderColor('#1a1a2e'); // Цвет шапки
            Telegram.WebApp.setBackgroundColor('#0f0f1a'); // Цвет фона

            // Получение данных пользователя
            const user = Telegram.WebApp.initDataUnsafe.user;
            if (user) {
                document.getElementById('user-name').textContent = user.first_name || 'Гость';
                const avatarElement = document.getElementById('user-avatar');
                if (user.photo_url) {
                    avatarElement.innerHTML = `<img src="${user.photo_url}" alt="User Avatar">`;
                } else {
                    avatarElement.textContent = user.first_name ? user.first_name.charAt(0) : 'G';
                }
            }
        }

        // --- Локальное хранилище и состояние --- //
        let balance = parseInt(localStorage.getItem('userBalance')) || 100;
        let completedTasks = JSON.parse(localStorage.getItem('completedTasks')) || [];
        let lastDailyBonusClaimed = localStorage.getItem('lastDailyBonusClaimed');

        const balanceAmountElement = document.getElementById('balance-amount');
        const tasksListElement = document.getElementById('tasks-list');
        const spinRouletteBtn = document.getElementById('spin-roulette-btn');
        const claimDailyBonusBtn = document.getElementById('claim-daily-bonus-btn');
        const rouletteWheel = document.getElementById('roulette-wheel');
        const gameResultModal = document.getElementById('game-result-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const modalCloseBtn = document.getElementById('modal-close-btn');
        const toastContainer = document.getElementById('toast-container');

        // --- Функции обновления UI --- //

        /**
         * Обновляет отображение баланса с плавной анимацией счетчика.
         * @param {number} newBalance - Новый баланс.
         */
        function updateBalanceUI(newBalance) {
            const currentBalance = parseInt(balanceAmountElement.textContent);
            const duration = 500; // ms
            const start = currentBalance;
            const end = newBalance;
            let startTime = null;

            const animate = (currentTime) => {
                if (!startTime) startTime = currentTime;
                const progress = Math.min((currentTime - startTime) / duration, 1);
                const animatedValue = Math.floor(start + (end - start) * progress);
                balanceAmountElement.textContent = animatedValue;

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    balanceAmountElement.textContent = newBalance; // Убедимся, что конечное значение точное
                }
            };

            requestAnimationFrame(animate);
            balance = newBalance;
            localStorage.setItem('userBalance', newBalance);

            // TODO: Здесь будет fetch запрос к API для обновления баланса на сервере
            // fetch('/api/user/balance', { method: 'POST', body: JSON.stringify({ balance: newBalance }) });
        }

        /**
         * Показывает всплывающее уведомление (тост).
         * @param {string} message - Сообщение для отображения.
         * @param {string} type - Тип уведомления (например, 'success', 'error').
         */
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.classList.add('toast', type);
            toast.textContent = message;
            toastContainer.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000); // Удалить тост через 3 секунды
        }

        /**
         * Показывает модальное окно.
         * @param {string} title - Заголовок модального окна.
         * @param {string} message - Сообщение модального окна.
         * @param {function} onClose - Функция, вызываемая при закрытии модального окна.
         */
        function showModal(title, message, onClose = () => {})
        {
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            gameResultModal.classList.add('active');

            const closeHandler = () => {
                gameResultModal.classList.remove('active');
                modalCloseBtn.removeEventListener('click', closeHandler);
                gameResultModal.removeEventListener('click', closeHandler);
                onClose();
            };

            modalCloseBtn.addEventListener('click', closeHandler);
            gameResultModal.addEventListener('click', (e) => {
                if (e.target === gameResultModal) {
                    closeHandler();
                }
            });
        }

        // --- Обработчики событий --- //

        // Анимация блеска баланса
        document.getElementById('balance-info').addEventListener('click', function(e) {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            this.appendChild(sparkle);

            const rect = this.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            sparkle.style.width = sparkle.style.height = `${size}px`;
            sparkle.style.left = `${e.clientX - rect.left - size / 2}px`;
            sparkle.style.top = `${e.clientY - rect.top - size / 2}px`;

            sparkle.addEventListener('animationend', () => {
                sparkle.remove();
            });
        });

        // Переключение табов
        document.querySelectorAll('.tab-button').forEach(button => {
            button.addEventListener('click', function() {
                document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');

                document.querySelectorAll('.content-section').forEach(section => {
                    section.classList.remove('active');
                });

                const targetSectionId = this.dataset.target;
                const targetSection = document.getElementById(targetSectionId);
                if (targetSection) {
                    targetSection.classList.add('active');
                }
            });
        });

        // Ripple эффект для кнопок
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.btn').forEach(button => {
                button.addEventListener('click', function(e) {
                    if (this.disabled) return;

                    const ripple = document.createElement('span');
                    ripple.classList.add('ripple');
                    this.appendChild(ripple);

                    const rect = this.getBoundingClientRect();
                    const size = Math.max(rect.width, rect.height);
                    ripple.style.width = ripple.style.height = `${size}px`;
                    ripple.style.left = `${e.clientX - rect.left - size / 2}px`;
                    ripple.style.top = `${e.clientY - rect.top - size / 2}px`;

                    ripple.addEventListener('animationend', () => {
                        ripple.remove();
                    });
                });
            });
        });

        // --- Логика Рулетки --- //
        const rouletteMultipliers = [0.5, 1, 2, 5, 0, 0.5, 1, 2]; // 8 секторов
        const sectorColors = ['#4CAF50', '#2196F3', '#FFC107', '#F44336', '#9E9E9E', '#4CAF50', '#2196F3', '#FFC107'];
        const betAmount = 10;

        /**
         * Генерирует секторы рулетки динамически.
         */
        function generateRouletteSectors() {
            const numSectors = rouletteMultipliers.length;
            const anglePerSector = 360 / numSectors;

            rouletteWheel.innerHTML = ''; // Очищаем перед генерацией

            rouletteMultipliers.forEach((multiplier, index) => {
                const sector = document.createElement('div');
                sector.classList.add('wheel-sector');
                sector.style.backgroundColor = sectorColors[index];
                sector.style.transform = `rotate(${index * anglePerSector}deg) skewY(-45deg)`; // Adjust skew for visual effect
                sector.style.clipPath = `polygon(0 0, 100% 0, 100% 100%, 0 100%)`; // Placeholder, actual clip-path is complex for pie slices

                const textSpan = document.createElement('span');
                textSpan.textContent = `${multiplier}x`;
                sector.appendChild(textSpan);

                // Более точное позиционирование текста
                textSpan.style.transform = `rotate(${anglePerSector / 2}deg) translate(-50%, -50%)`;
                textSpan.style.left = `50%`;
                textSpan.style.top = `25%`;

                rouletteWheel.appendChild(sector);
            });

            // Correctly apply rotation for each sector to form a circle
            const sectors = rouletteWheel.querySelectorAll('.wheel-sector');
            sectors.forEach((sector, index) => {
                sector.style.transform = `rotate(${index * anglePerSector}deg) skewY(-45deg)`;
                sector.style.transformOrigin = '0% 100%'; // Pivot point for rotation
                sector.style.left = '50%';
                sector.style.top = '50%';
                sector.style.clipPath = `polygon(0% 0%, 100% 0%, 75% 100%, 25% 100%)`; // This is still a simplification
                // For perfect pie slices, SVG or more complex CSS is needed.
                // For this example, we'll rely on the overall wheel rotation and text positioning.
                sector.style.backgroundColor = sectorColors[index];
                sector.style.transform = `rotate(${index * anglePerSector}deg) skewY(-45deg)`;
                sector.style.transformOrigin = '0% 100%';
                sector.style.left = '50%';
                sector.style.top = '50%';
                sector.style.clipPath = `polygon(0% 0%, 100% 0%, 75% 100%, 25% 100%)`;

                // Rotate the text back to be readable
                const textSpan = sector.querySelector('span');
                textSpan.style.transform = `rotate(${90 + anglePerSector / 2}deg) translate(-50%, -50%)`;
                textSpan.style.left = `75%`;
                textSpan.style.top = `50%`;
            });
        }

        // Инициализация секторов рулетки при загрузке
        generateRouletteSectors();

        spinRouletteBtn.addEventListener('click', () => {
            if (balance < betAmount) {
                showModal('Недостаточно звёзд', `Для игры в рулетку требуется ${betAmount} ⭐. У вас ${balance} ⭐.`);
                return;
            }

            spinRouletteBtn.disabled = true;
            updateBalanceUI(balance - betAmount);

            // TODO: Здесь будет fetch запрос к API для игры в рулетку
            // fetch('/api/spin', { method: 'POST', body: JSON.stringify({ bet: betAmount }) })
            // .then(response => response.json())
            // .then(data => { /* обработка результата */ });

            const numSectors = rouletteMultipliers.length;
            const anglePerSector = 360 / numSectors;

            // Выбираем случайный сектор для выигрыша
            const winningSectorIndex = Math.floor(Math.random() * numSectors);
            const winningMultiplier = rouletteMultipliers[winningSectorIndex];

            // Рассчитываем угол поворота для остановки на выигрышном секторе
            // Добавляем несколько полных оборотов для эффекта вращения
            // Вычитаем половину угла сектора, чтобы стрелка указывала на центр сектора
            const rotationDegrees = 360 * 5 + (360 - (winningSectorIndex * anglePerSector + anglePerSector / 2));

            rouletteWheel.style.transition = 'transform 4s cubic-bezier(0.25, 0.1, 0.25, 1)';
            rouletteWheel.style.transform = `rotate(${rotationDegrees}deg)`;

            rouletteWheel.addEventListener('transitionend', function handler() {
                rouletteWheel.removeEventListener('transitionend', handler);
                spinRouletteBtn.disabled = false;

                const winAmount = betAmount * winningMultiplier;
                const newBalance = balance + winAmount;
                updateBalanceUI(newBalance);

                let title, message;
                if (winningMultiplier === 0) {
                    title = 'Проигрыш!';
                    message = `Вы проиграли. Ваш баланс: ${newBalance} ⭐`;
                } else if (winningMultiplier === 1) {
                    title = 'Ничья!';
                    message = `Ваша ставка возвращена. Ваш баланс: ${newBalance} ⭐`;
                } else {
                    title = 'Выигрыш!';
                    message = `Вы выиграли ${winAmount} ⭐! Ваш баланс: ${newBalance} ⭐`;
                }
                showModal(title, message);

                // Сброс трансформации для следующего вращения (без анимации)
                rouletteWheel.style.transition = 'none';
                rouletteWheel.style.transform = `rotate(${rotationDegrees % 360}deg)`;
            });
        });

        // --- Логика Заданий --- //
        const tasks = [
            { id: 'subscribe_channel', name: 'Подписаться на канал', description: 'Подпишитесь на наш Telegram канал', reward: 50 },
            { id: 'invite_friend', name: 'Пригласить друга', description: 'Пригласите друга в игру', reward: 100 },
            { id: 'login_3_days', name: 'Заходить 3 дня подряд', description: 'Заходите в игру 3 дня подряд', reward: 30 },
            { id: 'share_game', name: 'Поделиться игрой', description: 'Поделитесь ссылкой на игру с друзьями', reward: 25 },
        ];

        /**
         * Рендерит список заданий.
         */
        function renderTasks() {
            tasksListElement.innerHTML = '';
            tasks.forEach(task => {
                const isCompleted = completedTasks.includes(task.id);
                const taskCard = document.createElement('div');
                taskCard.classList.add('card', 'task-item');
                taskCard.innerHTML = `
                    <h3>${task.name}</h3>
                    <p>${task.description}</p>
                    <div class="reward"><span class="star-icon">⭐</span> ${task.reward}</div>
                    <button class="btn ${isCompleted ? 'disabled' : ''}" data-task-id="${task.id}" ${isCompleted ? 'disabled' : ''}>
                        ${isCompleted ? 'Выполнено' : 'Выполнить'}
                    </button>
                `;
                tasksListElement.appendChild(taskCard);
            });

            document.querySelectorAll('#tasks-list .btn').forEach(button => {
                button.addEventListener('click', function() {
                    const taskId = this.dataset.taskId;
                    if (!completedTasks.includes(taskId)) {
                        const task = tasks.find(t => t.id === taskId);
                        if (task) {
                            completedTasks.push(taskId);
                            localStorage.setItem('completedTasks', JSON.stringify(completedTasks));
                            updateBalanceUI(balance + task.reward);
                            showToast(`Задание выполнено! +${task.reward} ⭐`, 'success');
                            renderTasks(); // Перерисовать задания, чтобы обновить статус кнопки

                            // TODO: Здесь будет fetch запрос к API для отметки задания выполненным
                            // fetch('/api/task/complete', { method: 'POST', body: JSON.stringify({ taskId: taskId }) });
                        }
                    }
                });
            });
        }

        // --- Логика Ежедневного бонуса --- //

        /**
         * Проверяет, можно ли получить ежедневный бонус.
         * @returns {boolean} - true, если бонус можно получить, иначе false.
         */
        function canClaimDailyBonus() {
            if (!lastDailyBonusClaimed) return true;
            const lastClaimDate = new Date(lastDailyBonusClaimed);
            const now = new Date();
            const diffTime = Math.abs(now.getTime() - lastClaimDate.getTime());
            const diffHours = Math.ceil(diffTime / (1000 * 60 * 60));
            return diffHours >= 24;
        }

        /**
         * Обновляет состояние кнопки ежедневного бонуса.
         */
        function updateDailyBonusButton() {
            if (canClaimDailyBonus()) {
                claimDailyBonusBtn.disabled = false;
                claimDailyBonusBtn.textContent = 'Забрать 20 ⭐';
                claimDailyBonusBtn.classList.remove('disabled');
            } else {
                claimDailyBonusBtn.disabled = true;
                claimDailyBonusBtn.textContent = 'Бонус уже получен';
                claimDailyBonusBtn.classList.add('disabled');
            }
        }

        claimDailyBonusBtn.addEventListener('click', () => {
            if (canClaimDailyBonus()) {
                const bonusAmount = 20;
                updateBalanceUI(balance + bonusAmount);
                lastDailyBonusClaimed = new Date().toISOString();
                localStorage.setItem('lastDailyBonusClaimed', lastDailyBonusClaimed);
                showToast(`Ежедневный бонус получен! +${bonusAmount} ⭐`, 'success');
                updateDailyBonusButton();

                // TODO: Здесь будет fetch запрос к API для получения ежедневного бонуса
                // fetch('/api/daily-bonus', { method: 'POST' });
            } else {
                showToast('Ежедневный бонус уже получен. Попробуйте завтра.', 'info');
            }
        });

        // --- Инициализация при загрузке страницы --- //
        document.addEventListener('DOMContentLoaded', () => {
            updateBalanceUI(balance); // Инициализация баланса
            renderTasks(); // Рендер заданий
            updateDailyBonusButton(); // Обновление кнопки ежедневного бонуса
        });
    </script>
</body>
</html>
