<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Cinematic Upgrade System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="upgrade-cinematic.css">
</head>
<body>
    <!-- Particle Canvas -->
    <canvas id="particleCanvas" class="particle-canvas"></canvas>
    
    <!-- Overlay for dimming effect -->
    <div id="upgradeOverlay" class="upgrade-overlay"></div>
    
    <!-- Main Upgrade Container -->
    <div class="upgrade-container" id="upgradeContainer">
        <!-- Items Section -->
        <div class="items-section">
            <!-- Current Item (Left) -->
            <div class="item-slot current-item" id="currentItem">
                <div class="item-glow"></div>
                <div class="item-content">
                    <div class="item-icon">🔫</div>
                    <div class="item-name">AK-47 | Redline</div>
                    <div class="item-rarity">Field-Tested</div>
                    <div class="item-value">$125.00</div>
                </div>
                <div class="item-particles"></div>
            </div>
            
            <!-- Upgrade Zone (Center) -->
            <div class="upgrade-zone">
                <div class="upgrade-meter-container">
                    <div class="upgrade-meter" id="upgradeMeter">
                        <div class="meter-fill" id="meterFill"></div>
                        <div class="meter-pointer" id="meterPointer"></div>
                    </div>
                    <div class="success-rate" id="successRate">45%</div>
                </div>
                
                <div class="upgrade-energy" id="upgradeEnergy">
                    <div class="energy-core"></div>
                    <div class="energy-ring"></div>
                    <div class="energy-sparks"></div>
                </div>
                
                <div class="upgrade-button-container">
                    <button class="upgrade-button" id="upgradeButton">
                        <span class="button-text">UPGRADE</span>
                        <span class="button-glow"></span>
                        <span class="button-particles"></span>
                    </button>
                </div>
            </div>
            
            <!-- Target Item (Right) -->
            <div class="item-slot target-item" id="targetItem">
                <div class="item-glow"></div>
                <div class="item-content">
                    <div class="item-icon">🔫</div>
                    <div class="item-name">AK-47 | Fire Serpent</div>
                    <div class="item-rarity">Minimal Wear</div>
                    <div class="item-value">$450.00</div>
                </div>
                <div class="item-particles"></div>
            </div>
        </div>
        
        <!-- Result Effects -->
        <div class="result-effects" id="resultEffects">
            <div class="success-effect" id="successEffect">
                <div class="success-flash"></div>
                <div class="success-confetti"></div>
                <div class="success-text">SUCCESS!</div>
            </div>
            
            <div class="fail-effect" id="failEffect">
                <div class="fail-flash"></div>
                <div class="fail-shatter"></div>
                <div class="fail-text">FAILED</div>
            </div>
        </div>
        
        <!-- Status Text -->
        <div class="upgrade-status" id="upgradeStatus">
            <div class="status-preparation">Preparing upgrade...</div>
            <div class="status-charging">Charging energy...</div>
            <div class="status-tension">Almost there...</div>
            <div class="status-result" id="statusResult"></div>
        </div>
    </div>
    
    <!-- Sound Effects -->
    <audio id="chargingSound" preload="auto">
        <source src="sounds/charging.mp3" type="audio/mpeg">
    </audio>
    <audio id="successSound" preload="auto">
        <source src="sounds/success.mp3" type="audio/mpeg">
    </audio>
    <audio id="failSound" preload="auto">
        <source src="sounds/fail.mp3" type="audio/mpeg">
    </audio>
    
    <script src="upgrade-cinematic.js"></script>
</body>
</html>
